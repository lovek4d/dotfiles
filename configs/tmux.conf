# extended-keys: enables shift+enter newlines (e.g. in claude cli)
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# shift+enter → newline in claude cli (CSI u encoding)
bind -n S-Enter send-keys Escape "[13;2u"

# wider left status to avoid truncating cgt session names
set-option -g status-left-length 60

## claude queue: keybindings + status bar

# ctrl+b ctrl+q → fzf popup listing queued sessions by priority (prompt > idle > thinking > paused)
bind-key C-q popup -E -w 60 -h 20 \
  'D=~/.claude/queue; p=""; i=""; t=""; s=""; for f in "$D"/*; do [ -f "$f" ] || continue; n="${f##*/}"; tmux has-session -t "$n" 2>/dev/null || continue; read x < "$f"; case "$x" in prompt) p="$p[prompt]   $n\n";; thinking) t="$t[thinking] $n\n";; paused) s="$s[paused]   $n\n";; *) i="$i[idle]     $n\n";; esac; done; printf "%b%b%b%b" "$p" "$i" "$t" "$s" | fzf --prompt="queue> " --reverse | sed "s/^\[[a-z]*\] *//" | xargs -I{} tmux switch-client -t {}'

# ctrl+b ctrl+w → demote current session to paused
bind-key C-w run-shell \
  'S=$(tmux display-message -p "#{session_name}"); f="$HOME/.claude/queue/$S"; if [ -f "$f" ]; then read t < "$f"; case "$t" in paused) tmux display-message "already paused: $S";; *) echo paused > "$f"; tmux display-message "paused: $S (was $t)";; esac; else tmux display-message "not in queue: $S"; fi'

# status bar: count queued sessions by state (Prompt/Idle/Thinking/Paused), show non-zero counts + clock
set-option -g status-interval 2
set-option -g status-right \
  '#(D=$HOME/.claude/queue; p=0; i=0; t=0; s=0; for f in "$D"/*; do [ -f "$f" ] || continue; n="${f##*/}"; tmux has-session -t "$n" 2>/dev/null || continue; read x < "$f"; case "$x" in prompt) p=$((p+1));; thinking) t=$((t+1));; paused) s=$((s+1));; *) i=$((i+1));; esac; done; [ $p -gt 0 ] && printf "Prompt:%d " $p; [ $i -gt 0 ] && printf "Idle:%d " $i; [ $t -gt 0 ] && printf "Thinking:%d " $t; [ $s -gt 0 ] && printf "Paused:%d " $s) %H:%M'
