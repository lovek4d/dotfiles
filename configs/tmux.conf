# extended-keys: enables shift+enter newlines (e.g. in claude cli)
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# shift+enter → newline in claude cli (CSI u encoding)
bind -n S-Enter send-keys Escape "[13;2u"

# wider left status to avoid truncating cgt session names
set-option -g status-left-length 60

# ctrl+b v → whisper voice recording popup
bind-key v popup -E -x R -w 80 -h 20 '~/dev/dotfiles/scripts/whisper/record.sh'

set-option -g status-right '%H:%M'
