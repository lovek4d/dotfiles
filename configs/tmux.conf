# extended-keys: enables shift+enter newlines (e.g. in claude cli)
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# shift+enter → newline in claude cli (CSI u encoding)
bind -n S-Enter send-keys Escape "[13;2u"

# wider left status to avoid truncating cgt session names
set-option -g status-left-length 60

## claude queue: keybindings + status bar

# ctrl+b ctrl+q → fzf popup listing queued sessions by priority (prompt > idle > thinking > paused)
bind-key C-q popup -E -w 60 -h 20 '~/dev/dotfiles/configs/tmux/claude-queue-popup.sh'

# ctrl+b ctrl+w → demote current session to paused
bind-key C-w run-shell '~/dev/dotfiles/configs/tmux/claude-queue-pause.sh'

# status bar: count queued sessions by state (Prompt/Idle/Thinking/Paused), show non-zero counts + clock
set-option -g status-interval 2
set-option -g status-right '#(~/dev/dotfiles/configs/tmux/claude-queue-status.sh) %H:%M'
